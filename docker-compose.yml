# lom 联盟 · 本地开发
# 启动: docker compose up -d
# 停止: docker compose down

services:
  mysql:
    image: mysql:8.0
    container_name: lom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-lom}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - common-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: lom-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://root:${DB_PASSWORD}@mysql:3306/${DB_NAME:-lom}
    networks:
      - common-net
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:

networks:
  common-net:
    external: true
